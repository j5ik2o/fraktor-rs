[package]
name = "fraktor-showcases-std"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
# 基本依存（全 example 共通）
fraktor-actor-core-rs = { workspace = true, features = ["test-support"] }
fraktor-actor-adaptor-std-rs = { workspace = true, features = ["test-support"] }
fraktor-utils-core-rs = { workspace = true }
fraktor-stream-core-rs = { workspace = true }
serde_json = { workspace = true }
bincode = { workspace = true, features = ["alloc", "serde"] }
serde = { workspace = true, features = ["derive"] }

# advanced 依存（cross-module examples 用）
fraktor-persistence-core-rs = { workspace = true, optional = true }
fraktor-cluster-core-rs = { workspace = true, features = ["test-support"], optional = true }
fraktor-cluster-adaptor-std-rs = { workspace = true, features = ["test-support"], optional = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "net", "sync", "io-util"], optional = true }
anyhow = { workspace = true, optional = true }

[features]
default = []
advanced = [
    "dep:fraktor-persistence-core-rs",
    "dep:fraktor-cluster-core-rs",
    "dep:fraktor-cluster-adaptor-std-rs",
    "dep:tokio",
    "dep:anyhow",
    "fraktor-actor-adaptor-std-rs/tokio-executor",
]

[lib]
name = "fraktor_showcases_std"
path = "src/lib.rs"

# --- Basic examples ---

[[example]]
name = "getting_started"
path = "getting_started/main.rs"

[[example]]
name = "request_reply"
path = "request_reply/main.rs"

[[example]]
name = "state_management"
path = "state_management/main.rs"

[[example]]
name = "child_lifecycle"
path = "child_lifecycle/main.rs"

[[example]]
name = "timers"
path = "timers/main.rs"

[[example]]
name = "routing"
path = "routing/main.rs"

[[example]]
name = "stash"
path = "stash/main.rs"

[[example]]
name = "serialization"
path = "serialization/main.rs"

[[example]]
name = "stream_pipeline"
path = "stream_pipeline/main.rs"

[[example]]
name = "classic_logging"
path = "classic_logging/main.rs"

[[example]]
name = "classic_timers"
path = "classic_timers/main.rs"

[[example]]
name = "typed_event_stream"
path = "typed_event_stream/main.rs"

[[example]]
name = "typed_receptionist_router"
path = "typed_receptionist_router/main.rs"

# --- Advanced examples ---

[[example]]
name = "persistent_actor"
path = "persistent_actor/main.rs"
required-features = ["advanced"]

[lints]
workspace = true
