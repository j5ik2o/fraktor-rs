[package]
name = "fraktor-showcases-std"
version = "0.0.0"
edition = "2024"
publish = false

[dependencies]
# 基本依存（全 example 共通）
fraktor-actor-core-rs = { workspace = true }
fraktor-actor-adaptor-std-rs = { workspace = true, features = ["test-support"] }
fraktor-remote-core-rs = { workspace = true }
fraktor-remote-adaptor-std-rs = { workspace = true }
fraktor-utils-core-rs = { workspace = true, features = ["std-locks"] }
critical-section = { workspace = true, features = ["std"] }
fraktor-stream-core-rs = { workspace = true }
serde_json = { workspace = true }
bincode = { workspace = true, features = ["alloc", "serde"] }
serde = { workspace = true, features = ["derive"] }

# advanced 依存（cross-module examples 用）
fraktor-persistence-core-rs = { workspace = true, optional = true }
fraktor-cluster-core-rs = { workspace = true, optional = true }
fraktor-cluster-adaptor-std-rs = { workspace = true, optional = true }
tokio = { workspace = true, features = ["rt-multi-thread", "macros", "time", "net", "sync", "io-util"], optional = true }
anyhow = { workspace = true, optional = true }

[features]
default = []
advanced = [
    "dep:fraktor-persistence-core-rs",
    "dep:fraktor-cluster-core-rs",
    "dep:fraktor-cluster-adaptor-std-rs",
    "dep:tokio",
    "dep:anyhow",
    "fraktor-actor-adaptor-std-rs/tokio-executor",
]

[lib]
name = "fraktor_showcases_std"
path = "src/lib.rs"

# --- Basic examples ---

