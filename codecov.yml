# PR の追加変更行は base coverage からの低下を許可せず、
# project 全体の微小低下では PR を落とさない。
coverage:
  status:
    project:
      default:
        target: auto
        threshold: 0.02
        if_not_found: failure
        informational: false
    patch:
      default:
        target: auto
        threshold: 0%
        if_not_found: failure
        informational: false
