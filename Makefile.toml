[tasks.fmt]
description = "Format source code"
workspace = false
install_script = ['''
#!/usr/bin/env bash
set -euo pipefail
CHANNEL=$(awk -F'"' '/^\s*channel\s*=/ {print $2; exit}' rust-toolchain.toml)
if [ -z "${CHANNEL}" ]; then
  CHANNEL=nightly
fi
if ! rustup which rustfmt --toolchain "${CHANNEL}" >/dev/null 2>&1; then
  rustup install "${CHANNEL}"
fi
''']
script = '''
#!/usr/bin/env bash
set -euo pipefail
CHANNEL=$(awk -F'"' '/^\s*channel\s*=/ {print $2; exit}' rust-toolchain.toml)
if [ -z "${CHANNEL}" ]; then
  CHANNEL=nightly
fi
cargo +"${CHANNEL}" fmt
'''

[tasks.coverage-grcov]
description = "Generate code coverage report using grcov"
workspace = false
category = "Test"
script = '''
#!/usr/bin/env bash
./scripts/coverage.sh
'''

[tasks.coverage]
description = "Generate code coverage report"
workspace = false
category = "Test"
run_task = { name = "coverage-grcov" }

[tasks.lifetime-regression]
description = "Run lifetime regression suite (tests + coverage)"
workspace = false
category = "Test"
dependencies = ["coverage"]

[tasks.ci-check]
description = "Run full CI validation pipeline"
workspace = false
script = '''
#!/usr/bin/env bash
set -euo pipefail
ARGS=("$@")
if [ ${#ARGS[@]} -gt 0 ] && [ "${ARGS[0]}" = "--" ]; then
  ARGS=("${ARGS[@]:1}")
fi
if [ ${#ARGS[@]} -eq 0 ]; then
  ARGS=("all")
fi
./scripts/ci-check.sh "${ARGS[@]}"
'''

[tasks.ci-dylint]
description = "Run custom dylints (optionally specify lint names)"
workspace = false
script = '''
#!/usr/bin/env bash
set -euo pipefail
ARGS=("$@")
if [ ${#ARGS[@]} -gt 0 ] && [ "${ARGS[0]}" = "--" ]; then
  ARGS=("${ARGS[@]:1}")
fi
./scripts/ci-check.sh dylint "${ARGS[@]}"
'''

[tasks.actor-core-us1]
description = "Actor core US1: ping/pong pipeline (tests + examples)"
workspace = false
script = '''
#!/usr/bin/env bash
set -euo pipefail
cargo test -p fraktor-actor-core-kernel-rs --features std --test ping_pong
cargo run -q -p fraktor-actor-core-kernel-rs --example ping_pong_no_std --features std
cargo run -q -p fraktor-actor-core-kernel-rs --example ping_pong_tokio --features std
'''

