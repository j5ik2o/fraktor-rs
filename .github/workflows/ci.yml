name: ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUSTFLAGS: -D warnings
  CARGO_NET_OFFLINE: false
  DYLINT_VERSION: "4.1.0"
  # NOTE: CARGO_HOME and TMPDIR are set per-job via the
  # "Setup isolated CARGO_HOME / TMPDIR" step. They are NOT pinned at the
  # workflow level because:
  #   1. `${{ github.workspace }}/.cargo` is a *fixed* path inside each
  #      runner's `_work/<repo>` directory. On self-hosted runners that
  #      reuse the same workspace between successive jobs, stale state
  #      from a crashed previous job (broken `.cargo/bin/cargo` symlink,
  #      half-written registry index, etc.) leaks into the next job.
  #   2. The cargo binary itself is installed by `dtolnay/rust-toolchain`
  #      under `${HOME}/.cargo/bin`, not under the workflow-pinned
  #      `CARGO_HOME`. When PATH lookup happens to land on the workspace
  #      path first, the shell tries `<workspace>/.cargo/bin/cargo` which
  #      may not exist, and the job fails with ENOENT.
  # The per-job step uses `mktemp -d` rooted at `${RUNNER_TEMP}` for true
  # uniqueness (auto-cleaned by the runner) and symlinks every binary
  # under `${HOME}/.cargo/bin` into the isolated `${CARGO_HOME}/bin`, so
  # both PATH lookup and `${CARGO_HOME}/bin/<tool>` resolution agree.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Format check (fastest, prerequisite for other jobs)
  format:
    name: Format Check
    runs-on: self-hosted
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
          components: rustfmt
      - name: Setup isolated CARGO_HOME / TMPDIR
        shell: bash
        run: |
          set -euo pipefail
          iso_root="$(mktemp -d "${RUNNER_TEMP}/fraktor-ci-XXXXXXXX")"
          iso_cargo="${iso_root}/cargo"
          iso_tmp="${iso_root}/tmp"
          mkdir -p "${iso_cargo}/bin" "${iso_tmp}"
          if [ -d "${HOME}/.cargo/bin" ]; then
            for bin in "${HOME}/.cargo/bin/"*; do
              [ -e "${bin}" ] || continue
              ln -sf "${bin}" "${iso_cargo}/bin/$(basename "${bin}")"
            done
          fi
          {
            echo "CARGO_HOME=${iso_cargo}"
            echo "TMPDIR=${iso_tmp}"
          } >> "${GITHUB_ENV}"
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: ./scripts/ci-check.sh lint

  # Lint checks
  lint:
    name: Lint Check
    runs-on: self-hosted
    needs: format
    strategy:
      matrix:
        check:
          - name: Clippy
            script: clippy
          - name: Dylint
            script: dylint
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
          components: clippy
      - name: Setup isolated CARGO_HOME / TMPDIR
        shell: bash
        run: |
          set -euo pipefail
          iso_root="$(mktemp -d "${RUNNER_TEMP}/fraktor-ci-XXXXXXXX")"
          iso_cargo="${iso_root}/cargo"
          iso_tmp="${iso_root}/tmp"
          mkdir -p "${iso_cargo}/bin" "${iso_tmp}"
          if [ -d "${HOME}/.cargo/bin" ]; then
            for bin in "${HOME}/.cargo/bin/"*; do
              [ -e "${bin}" ] || continue
              ln -sf "${bin}" "${iso_cargo}/bin/$(basename "${bin}")"
            done
          fi
          {
            echo "CARGO_HOME=${iso_cargo}"
            echo "TMPDIR=${iso_tmp}"
          } >> "${GITHUB_ENV}"
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
      - name: Run ${{ matrix.check.name }}
        run: ./scripts/ci-check.sh ${{ matrix.check.script }}

  # Build and test
  test:
    name: Test (${{ matrix.target.name }})
    runs-on: self-hosted
    needs: format
    env:
      TEST_TIME_FACTOR: "2.0"
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: no_std
            script: no-std
          - name: std
            script: std
          - name: workspace
            script: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
      - name: Setup isolated CARGO_HOME / TMPDIR
        shell: bash
        run: |
          set -euo pipefail
          iso_root="$(mktemp -d "${RUNNER_TEMP}/fraktor-ci-XXXXXXXX")"
          iso_cargo="${iso_root}/cargo"
          iso_tmp="${iso_root}/tmp"
          mkdir -p "${iso_cargo}/bin" "${iso_tmp}"
          if [ -d "${HOME}/.cargo/bin" ]; then
            for bin in "${HOME}/.cargo/bin/"*; do
              [ -e "${bin}" ] || continue
              ln -sf "${bin}" "${iso_cargo}/bin/$(basename "${bin}")"
            done
          fi
          {
            echo "CARGO_HOME=${iso_cargo}"
            echo "TMPDIR=${iso_tmp}"
          } >> "${GITHUB_ENV}"
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.target.name }}
      - name: Run ${{ matrix.target.name }} tests
        run: ./scripts/ci-check.sh ${{ matrix.target.script }}

  # Documentation build
  docs:
    name: Documentation
    runs-on: self-hosted
    needs: format
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
      - name: Setup isolated CARGO_HOME / TMPDIR
        shell: bash
        run: |
          set -euo pipefail
          iso_root="$(mktemp -d "${RUNNER_TEMP}/fraktor-ci-XXXXXXXX")"
          iso_cargo="${iso_root}/cargo"
          iso_tmp="${iso_root}/tmp"
          mkdir -p "${iso_cargo}/bin" "${iso_tmp}"
          if [ -d "${HOME}/.cargo/bin" ]; then
            for bin in "${HOME}/.cargo/bin/"*; do
              [ -e "${bin}" ] || continue
              ln -sf "${bin}" "${iso_cargo}/bin/$(basename "${bin}")"
            done
          fi
          {
            echo "CARGO_HOME=${iso_cargo}"
            echo "TMPDIR=${iso_tmp}"
          } >> "${GITHUB_ENV}"
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs
      - name: Build documentation
        run: ./scripts/ci-check.sh doc

  # Examples build
  examples:
    name: Examples
    runs-on: self-hosted
    needs: format
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
      - name: Setup isolated CARGO_HOME / TMPDIR
        shell: bash
        run: |
          set -euo pipefail
          iso_root="$(mktemp -d "${RUNNER_TEMP}/fraktor-ci-XXXXXXXX")"
          iso_cargo="${iso_root}/cargo"
          iso_tmp="${iso_root}/tmp"
          mkdir -p "${iso_cargo}/bin" "${iso_tmp}"
          if [ -d "${HOME}/.cargo/bin" ]; then
            for bin in "${HOME}/.cargo/bin/"*; do
              [ -e "${bin}" ] || continue
              ln -sf "${bin}" "${iso_cargo}/bin/$(basename "${bin}")"
            done
          fi
          {
            echo "CARGO_HOME=${iso_cargo}"
            echo "TMPDIR=${iso_tmp}"
          } >> "${GITHUB_ENV}"
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: examples
      - name: Build examples
        run: ./scripts/ci-check.sh examples

  # All jobs completion check
  ci-success:
    name: CI Success
    runs-on: self-hosted
    needs:
      - format
      - lint
      - test
      - docs
      - examples
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed successfully"
