name: ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUSTFLAGS: -D warnings
  CARGO_NET_OFFLINE: false
  DYLINT_VERSION: "4.1.0"
  # Pin CARGO_HOME to the per-job workspace so concurrent self-hosted runners
  # never share the registry / package cache. The default would be the runner
  # user's `~/.cargo`, which is a single directory across every runner instance
  # on the same physical machine; that caused intermittent
  # "could not parse/generate dep info" failures when two parallel jobs raced
  # on the same itertools / regex_automata / clap_builder build artifacts.
  CARGO_HOME: ${{ github.workspace }}/.cargo
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  # Format check (fastest, prerequisite for other jobs)
  format:
    name: Format Check
    runs-on: self-hosted
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
          components: rustfmt
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: ./scripts/ci-check.sh lint

  # Lint checks
  lint:
    name: Lint Check
    runs-on: self-hosted
    needs: format
    strategy:
      matrix:
        check:
          - name: Clippy
            script: clippy
          - name: Dylint
            script: dylint
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
          components: clippy
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
          cache-directories: ${{ github.workspace }}/.cargo/bin
      - name: Bootstrap cargo-dylint binary from runner cache
        # The workflow pins CARGO_HOME to ${{ github.workspace }}/.cargo so that
        # concurrent self-hosted runners do not race on a shared registry, but
        # that also means each fresh job starts without `cargo-dylint`. Building
        # `cargo-dylint` from source pulls in `openssl-sys`, which fails on
        # runners that do not have `libssl-dev` / `pkg-config`. Instead reuse
        # the pre-installed binary that already lives at the runner user's
        # default cargo home (`~/.cargo/bin/cargo-dylint`) when present.
        if: matrix.check.name == 'Dylint'
        run: |
          mkdir -p "${CARGO_HOME}/bin"
          if [ -x "${HOME}/.cargo/bin/cargo-dylint" ]; then
            cp "${HOME}/.cargo/bin/cargo-dylint" "${CARGO_HOME}/bin/cargo-dylint"
            "${CARGO_HOME}/bin/cargo-dylint" --version || true
          else
            echo "::notice::no pre-installed cargo-dylint at ${HOME}/.cargo/bin; ci-check.sh will attempt to install"
          fi
      - name: Run ${{ matrix.check.name }}
        run: ./scripts/ci-check.sh ${{ matrix.check.script }}

  # Build and test
  test:
    name: Test (${{ matrix.target.name }})
    runs-on: self-hosted
    needs: format
    env:
      TEST_TIME_FACTOR: "2.0"
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: no_std
            script: no-std
          - name: std
            script: std
          - name: workspace
            script: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.target.name }}
      - name: Run ${{ matrix.target.name }} tests
        run: ./scripts/ci-check.sh ${{ matrix.target.script }}

  # Documentation build
  docs:
    name: Documentation
    runs-on: self-hosted
    needs: format
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs
      - name: Build documentation
        run: ./scripts/ci-check.sh doc

  # Examples build
  examples:
    name: Examples
    runs-on: self-hosted
    needs: format
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-02-15
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: examples
      - name: Build examples
        run: ./scripts/ci-check.sh examples

  # All jobs completion check
  ci-success:
    name: CI Success
    runs-on: self-hosted
    needs:
      - format
      - lint
      - test
      - docs
      - examples
    steps:
      - name: All checks passed
        run: echo "✅ All CI checks passed successfully"
