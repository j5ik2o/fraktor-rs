name: ci
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
    types:
      - checks_requested
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      runner:
        description: Runner to use for this manual CI run
        required: true
        default: ubuntu-latest
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUSTFLAGS: -D warnings
  CARGO_NET_OFFLINE: false
  DYLINT_VERSION: "6.0.0"
  RUST_TOOLCHAIN: nightly-2026-06-05
  # NOTE: On self-hosted runners, CARGO_HOME, RUSTUP_HOME, and TMPDIR are set
  # per-job via the `./.github/actions/setup-isolated-rust` composite action.
  # They are NOT pinned at the workflow level because:
  #   1. `${{ github.workspace }}/.cargo` is a *fixed* path inside each
  #      runner's `_work/<repo>` directory. On self-hosted runners that
  #      reuse the same workspace between successive jobs, stale state
  #      from a crashed previous job (broken `.cargo/bin/cargo` symlink,
  #      half-written registry index, etc.) leaks into the next job.
  #   2. The cargo/rustup binaries themselves are installed by
  #      `dtolnay/rust-toolchain` under `${HOME}/.cargo/bin`, not under
  #      the workflow-pinned `CARGO_HOME`. When PATH lookup happens to
  #      land on the workspace path first, the shell tries
  #      `<workspace>/.cargo/bin/cargo` which may not exist, and the job
  #      fails with ENOENT.
  #   3. Multiple self-hosted runners share the same home directory
  #      (`~/.cargo/bin/` and `~/.rustup/`), so concurrent jobs calling
  #      `rustup default <toolchain>` can truncate `~/.rustup/settings.toml`
  #      (missing field `version` error) and overwrite `~/.cargo/bin/rustup`
  #      while another job is executing it (ETXTBSY / text file busy).
  # The composite action uses `mktemp -d` rooted at `${RUNNER_TEMP}` for
  # true uniqueness (auto-cleaned by the runner), COPIES the rustup binary
  # (not symlink, so ETXTBSY is avoided), and copies `~/.rustup/` so that
  # toolchain state is isolated from other concurrent jobs. It MUST run
  # before `dtolnay/rust-toolchain@master` so that action writes to the
  # isolated paths.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  changes:
    name: Detect Rust source changes
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    outputs:
      run_code_checks: ${{ steps.filter.outputs.run_code_checks }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed paths
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "${EVENT_NAME}" == "schedule" || "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "run_code_checks=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base="${BASE_SHA}"
            head="${HEAD_SHA}"
          else
            base="${BEFORE_SHA}"
            head="${HEAD_SHA}"
          fi

          if [[ -z "${base}" ]]; then
            echo "run_code_checks=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${base}" =~ ^0{40}$ ]]; then
            echo "run_code_checks=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          changed_entries="$(git diff --name-status -M "${base}" "${head}")"
          if [[ -z "${changed_entries}" ]]; then
            echo "run_code_checks=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          is_rust_check_path() {
            local path="$1"
            [[ "${path}" == *.rs ]] && return 0
            case "${path}" in
              Cargo.lock | */Cargo.lock | Cargo.toml | */Cargo.toml | clippy.toml | */clippy.toml | rustfmt.toml | */rustfmt.toml | rust-toolchain.toml | */rust-toolchain.toml | .cargo/config.toml | .github/workflows/ci.yml)
                return 0
                ;;
              *)
                return 1
                ;;
            esac
          }

          run_code_checks=false
          while IFS=$'\t' read -r status path_a path_b; do
            paths=("${path_a}")
            case "${status}" in
              R* | C*)
                paths=("${path_a}" "${path_b}")
                ;;
            esac

            for path in "${paths[@]}"; do
              if is_rust_check_path "${path}"; then
                run_code_checks=true
                break 2
              fi
            done
          done <<< "${changed_entries}"

          echo "run_code_checks=${run_code_checks}" >> "${GITHUB_OUTPUT}"

  # Format check (fastest, prerequisite for other jobs)
  format:
    name: Format Check
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
    if: ${{ needs.changes.outputs.run_code_checks == 'true' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup isolated CARGO_HOME / RUSTUP_HOME / TMPDIR
        if: ${{ runner.environment == 'self-hosted' }}
        uses: ./.github/actions/setup-isolated-rust
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: ./scripts/ci-check.sh lint

  # Lint checks
  lint:
    name: Lint Check
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - format
    if: ${{ needs.changes.outputs.run_code_checks == 'true' }}
    strategy:
      matrix:
        check:
          - name: Clippy
            script: clippy
          - name: Dylint
            script: dylint
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup isolated CARGO_HOME / RUSTUP_HOME / TMPDIR
        if: ${{ runner.environment == 'self-hosted' }}
        uses: ./.github/actions/setup-isolated-rust
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint
      - name: Run ${{ matrix.check.name }}
        run: ./scripts/ci-check.sh ${{ matrix.check.script }}

  takt-review-wrapper-tests:
    name: TAKT Review Wrapper Tests
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - format
    if: ${{ needs.changes.outputs.run_code_checks == 'true' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Run TAKT review wrapper helper tests
        run: node --test --test-reporter=spec .github/scripts/*.test.mjs scripts/*.test.mjs

  # ビルドと単体テスト
  #
  # 実行頻度の方針:
  # - pull_request / main push: まず単体テスト中心の correctness gate を必ず実行する。
  # - integration / E2E は下の dedicated job で別途実行し、失敗箇所を切り分ける。
  # - performance / benchmark は CI の正しさゲートに含めない。
  test:
    name: Test (${{ matrix.target.name }})
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - format
    if: ${{ needs.changes.outputs.run_code_checks == 'true' }}
    env:
      TEST_TIME_FACTOR: "2.0"
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: no_std
            script: no-std
          - name: std
            script: std
          - name: unit
            script: unit-test
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup isolated CARGO_HOME / RUSTUP_HOME / TMPDIR
        if: ${{ runner.environment == 'self-hosted' }}
        uses: ./.github/actions/setup-isolated-rust
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test-${{ matrix.target.name }}
      - name: Run ${{ matrix.target.name }} tests
        run: ./scripts/ci-check.sh ${{ matrix.target.script }}

  # 結合テスト / E2E
  #
  # `scripts/ci-check.sh integration-test` は workspace の `--tests --examples`
  # と cross-crate E2E 専用 crate を明示実行する。actor の classic/typed user flow
  # や std adaptor boot、`tests/e2e` の runtime boot など、テストピラミッド上の
  # Integration / E2E 層はここで PR ごとに検証する。
  integration-e2e:
    name: Integration / E2E
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - test
    if: ${{ needs.changes.outputs.run_code_checks == 'true' }}
    env:
      TEST_TIME_FACTOR: "2.0"
      CI_CHECK_GUARD_TIMEOUT_INTEGRATION_SEC: "5400"
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup isolated CARGO_HOME / RUSTUP_HOME / TMPDIR
        if: ${{ runner.environment == 'self-hosted' }}
        uses: ./.github/actions/setup-isolated-rust
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: integration-e2e
      - name: Run integration and E2E tests
        run: ./scripts/ci-check.sh integration-test

  # カバレッジレポート
  #
  # `scripts/coverage.sh` は各 package の Unit / Contract /
  # Integration / E2E をまとめて計測し、HTML レポートを生成する。
  # PR / main push / schedule で成果物として確認できるよう、
  # 通常テストとは別ジョブで実行して artifact に保存する。
  coverage:
    name: Coverage Report
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - integration-e2e
    if: ${{ needs.changes.outputs.run_code_checks == 'true' }}
    permissions:
      contents: read
      id-token: write
    env:
      TEST_TIME_FACTOR: "2.0"
      CI_CHECK_GUARD_TIMEOUT_INTEGRATION_SEC: "5400"
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup isolated CARGO_HOME / RUSTUP_HOME / TMPDIR
        if: ${{ runner.environment == 'self-hosted' }}
        uses: ./.github/actions/setup-isolated-rust
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: coverage
      - name: Generate fraktor coverage reports
        run: ./scripts/coverage.sh --tool llvm-cov --format html-lcov --output target/coverage
      - name: Upload fraktor coverage HTML report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fraktor-coverage-html
          path: target/coverage/html
          if-no-files-found: warn
          retention-days: 14
      - name: Upload coverage reports to Codecov
        # third-party action の mutable tag リスクを避けるため、
        # v7.0.0 tag (e534...) が指す commit SHA に固定する。
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f
        with:
          use_oidc: true
          files: target/coverage/lcov.info
          disable_search: true
          flags: fraktor
          name: fraktor-coverage
          fail_ci_if_error: true

  # Codecov の外部 status が完了し、失敗していないことを CI Success に伝播する。
  codecov-status:
    name: Codecov Status
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - coverage
    if: ${{ always() && needs.changes.result == 'success' && needs.changes.outputs.run_code_checks == 'true' }}
    permissions:
      contents: read
      checks: read
      statuses: read
    steps:
      - name: Wait for Codecov status checks
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd
        env:
          COVERAGE_RESULT: ${{ needs.coverage.result }}
          CODECOV_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          IS_PULL_REQUEST: ${{ github.event_name == 'pull_request' }}
        with:
          script: |
            const coverageResult = process.env.COVERAGE_RESULT;
            if (coverageResult !== "success") {
              throw new Error(`coverage failed or was skipped: ${coverageResult}`);
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const ref = process.env.CODECOV_SHA;
            const requiredChecks = ["codecov/project"];

            if (process.env.IS_PULL_REQUEST === "true") {
              requiredChecks.push("codecov/patch");
            } else {
              core.info("Skipping codecov/patch outside pull_request events");
            }

            for (const checkName of requiredChecks) {
              await waitForCheck(checkName);
            }

            async function waitForCheck(checkName) {
              for (let attempt = 1; attempt <= 60; attempt += 1) {
                const run = await latestCheckRun(checkName);

                if (run) {
                  core.info(`${checkName}: status=${run.status} conclusion=${run.conclusion || ""} url=${run.html_url}`);

                  if (run.status === "completed") {
                    if (run.conclusion === "success") {
                      return;
                    }

                    throw new Error(`${checkName} failed with conclusion=${run.conclusion}`);
                  }
                } else {
                  const status = await latestCommitStatus(checkName);
                  if (status) {
                    core.info(`${checkName}: state=${status.state} url=${status.target_url || ""}`);

                    if (status.state === "success") {
                      return;
                    }
                    if (status.state === "failure" || status.state === "error") {
                      throw new Error(`${checkName} failed with state=${status.state}`);
                    }
                  } else {
                    core.info(`${checkName}: waiting for Codecov status (${attempt}/60)`);
                  }
                }

                await new Promise((resolve) => setTimeout(resolve, 10000));
              }

              core.warning(`${checkName} did not report within timeout; coverage upload already succeeded`);
            }

            async function latestCheckRun(checkName) {
              const response = await github.rest.checks.listForRef({
                owner,
                repo,
                ref,
                check_name: checkName,
                per_page: 100,
              });
              return response.data.check_runs
                .filter((checkRun) => checkRun.name === checkName)
                .sort((left, right) => {
                  const rightTime = Date.parse(right.started_at || right.created_at);
                  const leftTime = Date.parse(left.started_at || left.created_at);
                  return rightTime - leftTime;
                })[0];
            }

            async function latestCommitStatus(checkName) {
              const response = await github.rest.repos.getCombinedStatusForRef({ owner, repo, ref });
              return response.data.statuses.find((status) => status.context === checkName);
            }

  # Documentation build
  docs:
    name: Documentation
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - format
    if: ${{ needs.changes.outputs.run_code_checks == 'true' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup isolated CARGO_HOME / RUSTUP_HOME / TMPDIR
        if: ${{ runner.environment == 'self-hosted' }}
        uses: ./.github/actions/setup-isolated-rust
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: docs
      - name: Build documentation
        run: ./scripts/ci-check.sh doc

  # Examples build
  examples:
    name: Examples
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - format
    if: ${{ needs.changes.outputs.run_code_checks == 'true' }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
      - name: Setup isolated CARGO_HOME / RUSTUP_HOME / TMPDIR
        if: ${{ runner.environment == 'self-hosted' }}
        uses: ./.github/actions/setup-isolated-rust
      - name: Setup Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: Setup Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: examples
      - name: Build examples
        run: ./scripts/ci-check.sh examples

  review-thread-resolution:
    name: CI Review Thread Gate
    needs:
      - changes
      - format
      - lint
      - takt-review-wrapper-tests
      - test
      - integration-e2e
      - coverage
      - codecov-status
      - docs
      - examples
    if: ${{ always() && github.event_name == 'pull_request' && needs.changes.outputs.run_code_checks == 'true' }}
    permissions:
      contents: read
      checks: write
      statuses: write
      issues: read
      pull-requests: read
    uses: j5ik2o/ci/.github/workflows/review-thread-resolution.yml@560170b61c74a9a643a483a052ccbad0d6ad409a
    with:
      wait_for_other_checks: "false"
      ci_ref: 560170b61c74a9a643a483a052ccbad0d6ad409a

  # All jobs completion check
  ci-success:
    name: CI Success
    runs-on: ${{ github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted' && 'self-hosted' || 'ubuntu-latest' }}
    needs:
      - changes
      - format
      - lint
      - takt-review-wrapper-tests
      - test
      - integration-e2e
      - coverage
      - codecov-status
      - docs
      - examples
      - review-thread-resolution
    if: always()
    steps:
      - name: All checks passed
        env:
          RUN_CODE_CHECKS: ${{ needs.changes.outputs.run_code_checks }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          run_code_checks="${RUN_CODE_CHECKS}"
          if [[ "${{ needs.changes.result }}" != "success" ]]; then
            echo "changes failed"
            exit 1
          fi
          case "${run_code_checks}" in
            true)
              expected_code_job_result="success"
              ;;
            false)
              expected_code_job_result="skipped"
              ;;
            *)
              echo "changes did not report valid run_code_checks: ${run_code_checks}"
              exit 1
              ;;
          esac

          require_result() {
            local name="$1"
            local actual="$2"
            local expected="$3"
            if [[ "${actual}" != "${expected}" ]]; then
              echo "${name} was ${actual}; expected ${expected}"
              exit 1
            fi
          }

          require_result "format" "${{ needs.format.result }}" "${expected_code_job_result}"
          require_result "lint" "${{ needs.lint.result }}" "${expected_code_job_result}"
          require_result "takt-review-wrapper-tests" "${{ needs['takt-review-wrapper-tests'].result }}" "${expected_code_job_result}"
          require_result "test" "${{ needs.test.result }}" "${expected_code_job_result}"
          require_result "integration-e2e" "${{ needs['integration-e2e'].result }}" "${expected_code_job_result}"
          require_result "coverage" "${{ needs.coverage.result }}" "${expected_code_job_result}"
          require_result "codecov-status" "${{ needs['codecov-status'].result }}" "${expected_code_job_result}"
          require_result "docs" "${{ needs.docs.result }}" "${expected_code_job_result}"
          require_result "examples" "${{ needs.examples.result }}" "${expected_code_job_result}"
          if [[ "${EVENT_NAME}" == "pull_request" && "${run_code_checks}" == "true" ]]; then
            expected_review_thread_result="success"
          else
            expected_review_thread_result="skipped"
          fi
          require_result "review-thread-resolution" "${{ needs['review-thread-resolution'].result }}" "${expected_review_thread_result}"
          echo "✅ All CI checks passed successfully"
