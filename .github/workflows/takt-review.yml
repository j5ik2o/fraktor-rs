name: TAKT Review (Claude)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: takt-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  takt-review:
    name: TAKT Review (Claude)
    uses: j5ik2o/ci/.github/workflows/takt-review.yml@fa840a0ee2eaf371533d7da4b2e77fde8cd90014
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      workflow: review-takt-default
      provider: claude-sdk
      model: claude-sonnet-4-5-20250929
      wrapper_script: .github/scripts/takt-review-wrapper.mjs
      non_blocking: "true"
      ci_ref: fa840a0ee2eaf371533d7da4b2e77fde8cd90014
