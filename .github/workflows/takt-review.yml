name: TAKT Review (Claude)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  takt-review:
    name: TAKT Review (Claude)
    uses: j5ik2o/ci/.github/workflows/takt-review.yml@a672e3d9fca1de4b7b6b648c08c9ad263267dff6
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      workflow: review-takt-default
      provider: claude-sdk
      model: claude-sonnet-4-5-20250929
      wrapper_script: .github/scripts/takt-review-wrapper.mjs
      non_blocking: "true"
      ci_ref: a672e3d9fca1de4b7b6b648c08c9ad263267dff6
