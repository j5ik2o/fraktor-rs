name: TAKT Review (Claude)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: takt-review-trigger-${{ (github.event_name == 'pull_request' && github.event.pull_request.number) || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && startsWith(github.event.comment.body, '@takt') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) && github.event.issue.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && startsWith(github.event.comment.body, '@takt') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) }}

jobs:
  takt-review:
    name: TAKT Review (Claude)
    if: >
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.user.login != 'app/renovate' &&
        github.event.pull_request.user.login != 'renovate[bot]' &&
        !startsWith(github.event.pull_request.head.ref, 'renovate/') &&
        github.event.sender.type != 'Bot'
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.event.issue.state == 'open' &&
        github.event.issue.user.login != 'app/renovate' &&
        github.event.issue.user.login != 'renovate[bot]' &&
        github.event.sender.type != 'Bot' &&
        startsWith(github.event.comment.body, '@takt') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    uses: j5ik2o/ci/.github/workflows/takt-review.yml@276fb1dba389a47b9903cc28ce31001c995e23b4
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      pr_number: ${{ format('{0}', github.event.pull_request.number || github.event.issue.number) }}
      event_head_sha: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.sha) || '' }}
      comment_body: ${{ (github.event_name == 'issue_comment' && github.event.comment.body) || '' }}
      workflow: review-takt-default
      provider: claude-sdk
      model: claude-sonnet-4-5-20250929
      wrapper_script: .github/scripts/takt-review-wrapper.mjs
      non_blocking: "true"
      ci_ref: 276fb1dba389a47b9903cc28ce31001c995e23b4
