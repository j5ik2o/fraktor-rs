name: TAKT Review (Claude)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: takt-review-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  takt-review:
    name: TAKT Review (Claude)
    if: >
      (
        github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        github.event.pull_request.draft == false &&
        github.event.pull_request.user.login != 'app/renovate' &&
        github.event.pull_request.user.login != 'renovate[bot]' &&
        !startsWith(github.event.pull_request.head.ref, 'renovate/') &&
        github.event.sender.type != 'Bot'
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        github.event.issue.state == 'open' &&
        github.event.issue.user.login != 'app/renovate' &&
        github.event.issue.user.login != 'renovate[bot]' &&
        github.event.sender.type != 'Bot' &&
        startsWith(github.event.comment.body, '@takt') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    uses: j5ik2o/ci/.github/workflows/takt-review.yml@4ae09411283b73d83426ef3bb64fb734f91bba09
    permissions:
      contents: read
      pull-requests: write
      issues: write
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number }}
      comment_body: ${{ github.event.comment.body }}
      workflow: review-takt-default
      provider: claude-sdk
      model: claude-sonnet-4-5-20250929
      wrapper_script: .github/scripts/takt-review-wrapper.mjs
      ci_ref: 4ae09411283b73d83426ef3bb64fb734f91bba09
