name: Review Thread Refresh

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to refresh. Leave empty to refresh all open main PRs.
        required: false
        type: string
      wait_for_other_checks:
        description: Wait for other PR checks before evaluating review threads.
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
permissions:
  contents: read
  checks: write
  statuses: write
  issues: read
  pull-requests: read

jobs:
  refresh:
    name: Refresh review-thread state
    uses: j5ik2o/ci/.github/workflows/review-thread-resolution.yml@a672e3d9fca1de4b7b6b648c08c9ad263267dff6
    permissions:
      contents: read
      checks: write
      statuses: write
      issues: read
      pull-requests: read
    with:
      pr_number: ${{ inputs.pr_number }}
      wait_for_other_checks: ${{ inputs.wait_for_other_checks || 'true' }}
      ci_ref: a672e3d9fca1de4b7b6b648c08c9ad263267dff6
