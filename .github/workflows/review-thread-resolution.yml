name: Review Thread Refresh

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to refresh. Leave empty to refresh all open main PRs.
        required: false
        type: string
      wait_for_other_checks:
        description: Wait for other PR checks before evaluating review threads.
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      pr_number:
        description: PR number to refresh.
        required: false
        type: string
        default: ""
      wait_for_other_checks:
        description: Wait for other PR checks before evaluating review threads.
        required: false
        default: "true"
        type: string

permissions:
  contents: read
  checks: write
  statuses: write
  issues: read
  pull-requests: read

concurrency:
  group: review-thread-resolution-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}

jobs:
  refresh:
    name: Refresh review-thread state
    uses: j5ik2o/ci/.github/workflows/review-thread-resolution.yml@fa840a0ee2eaf371533d7da4b2e77fde8cd90014
    permissions:
      contents: read
      checks: write
      statuses: write
      issues: read
      pull-requests: read
    with:
      pr_number: ${{ inputs.pr_number }}
      base_branch: main
      required_context: Check unresolved comments
      wait_for_other_checks: ${{ inputs.wait_for_other_checks }}
      publish_status: "true"
      skip_status_for_dependabot: "true"
      ci_ref: fa840a0ee2eaf371533d7da4b2e77fde8cd90014
