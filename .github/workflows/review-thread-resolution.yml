name: Review Thread Refresh

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to refresh. Leave empty to refresh all open main PRs.
        required: false
        type: string
      wait_for_other_checks:
        description: Wait for other PR checks before evaluating review threads.
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      pr_number:
        description: PR number to refresh.
        required: true
        type: string
      wait_for_other_checks:
        description: Wait for other PR checks before evaluating review threads.
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  checks: write
  statuses: write
  issues: read
  pull-requests: read

concurrency:
  group: review-thread-resolution-${{ inputs.wait_for_other_checks == false && 'ci-' || 'event-' }}${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || 'refresh-all' }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' && inputs.wait_for_other_checks != false }}

jobs:
  refresh:
    name: Refresh review-thread state
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || inputs.pr_number != '' || github.event.pull_request != null || github.event.issue.pull_request != null }}
    uses: j5ik2o/ci/.github/workflows/review-thread-resolution.yml@4ae09411283b73d83426ef3bb64fb734f91bba09
    permissions:
      contents: read
      checks: write
      statuses: write
      issues: read
      pull-requests: read
    with:
      pr_number: ${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number }}
      base_branch: main
      required_context: Check unresolved comments
      wait_for_other_checks: ${{ inputs.wait_for_other_checks != false }}
      ci_ref: 4ae09411283b73d83426ef3bb64fb734f91bba09
