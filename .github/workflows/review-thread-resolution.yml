name: Review Thread Refresh

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  issue_comment:
    types: [created, edited, deleted]
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to refresh. Leave empty to refresh all open main PRs.
        required: false
        type: string
      wait_for_other_checks:
        description: Wait for other PR checks before evaluating review threads.
        required: false
        default: true
        type: boolean
  workflow_call:
    inputs:
      pr_number:
        description: PR number to refresh.
        required: false
        type: string
        default: ""
      wait_for_other_checks:
        description: Wait for other PR checks before evaluating review threads.
        required: false
        default: "true"
        type: string

permissions:
  contents: read
  checks: write
  issues: read
  pull-requests: read

concurrency:
  group: review-thread-resolution-trigger-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: ${{ github.event_name != 'schedule' && github.event_name != 'workflow_dispatch' }}

jobs:
  refresh:
    name: Refresh review-thread state
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call' || github.event.pull_request != null || github.event.issue.pull_request != null }}
    uses: j5ik2o/ci/.github/workflows/review-thread-resolution.yml@4f2c77eaa870ff1b04bfb9deeed45b18934d274f
    permissions:
      contents: read
      checks: write
      statuses: write
      issues: read
      pull-requests: read
    with:
      pr_number: ${{ format('{0}', inputs.pr_number || github.event.pull_request.number || github.event.issue.number || '') }}
      base_branch: main
      required_context: Check unresolved comments
      wait_for_other_checks: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') && format('{0}', inputs.wait_for_other_checks) || 'true' }}
      publish_status: "true"
      skip_status_for_dependabot: "true"
      ci_ref: 4f2c77eaa870ff1b04bfb9deeed45b18934d274f
