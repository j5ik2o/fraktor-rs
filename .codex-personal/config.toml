model = "gpt-5.5"
model_reasoning_effort = "xhigh"
suppress_unstable_features_warning = true
model_reasoning_summary = "detailed"
hide_agent_reasoning = false
show_raw_agent_reasoning = true
network_access = true
web_search = "live"
personality = "pragmatic"
model_context_window= 1000000
model_auto_compact_token_limit = 950000

[projects."/Users/j5ik2o/Sources/j5ik2o.github.com/nrslib/takt"]
trust_level = "trusted"

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins."google-calendar@openai-curated"]
enabled = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."slack@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[features]
terminal_resize_reflow = true
memories = true
external_migration = true
prevent_idle_sleep = true
goals = true
multi_agent = true
rmcp_client = true
unified_exec = true
shell_snapshot = true
steer = true
js_repl = false

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.worker]
description = "Implementation-focused agent for small targeted fixes."
config_file = "agents/worker.toml"