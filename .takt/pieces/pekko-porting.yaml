name: pekko-porting
description: Pekko互換仕様をRustで実装するための開発ピース（ギャップ分析→実装→QAレビュー→Pekko互換レビュー→監督）
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 30
initial_movement: plan

personas:
  pekko-porting-qa-reviewer: ../facets/personas/pekko-porting-qa-reviewer.md
  pekko-porting-compat-reviewer: ../facets/personas/pekko-porting-compat-reviewer.md

knowledge:
  pekko-porting: ../facets/knowledge/pekko-porting.md

policies:
  fraktor-coding: ../facets/policies/fraktor-coding.md
  pekko-compat: ../facets/policies/pekko-compat.md

instructions:
  pekko-porting-plan: ../facets/instructions/pekko-porting-plan.md
  pekko-porting-implement: ../facets/instructions/pekko-porting-implement.md
  pekko-porting-qa-fix: ../facets/instructions/pekko-porting-qa-fix.md
  pekko-porting-compat-fix: ../facets/instructions/pekko-porting-compat-fix.md
  pekko-porting-supervise: ../facets/instructions/pekko-porting-supervise.md
  pekko-porting-final-ci: ../facets/instructions/pekko-porting-final-ci.md
  pekko-porting-review-compat: ../facets/instructions/pekko-porting-review-compat.md
  pekko-porting-review-qa: ../facets/instructions/pekko-porting-review-qa.md
  ai-review: ../facets/instructions/ai-review.md
  ai-fix: ../facets/instructions/ai-fix.md
  arbitrate: ../facets/instructions/arbitrate.md

report_formats:
  pekko-compat-review: ../facets/output-contracts/pekko-compat-review.md

loop_monitors:
  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction_template: |
        ai_review と ai_fix のループが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（進捗がある）か、
        非生産的（同じ問題を繰り返している）かを判断してください。

        **参照するレポート:**
        - AIレビュー結果: {report:04-ai-review.md}

        **判断基準:**
        - 各サイクルで新しい問題が発見・修正されているか
        - 同じ指摘が繰り返されていないか
        - 修正が実際に反映されているか
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: ai_no_fix

  - cycle:
      - ai_fix
      - ai_no_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction_template: |
        ai_fix と ai_no_fix のループが {cycle_count} 回繰り返されました。

        ai_fix が修正不要と判断し、ai_no_fix が修正必要と差し戻すサイクルが
        繰り返されています。このループが健全か判断してください。

        **判断基準:**
        - ai_fix と ai_no_fix の間で同じ指摘について意見が分かれ続けていないか
        - 新しい観点や情報が各サイクルで追加されているか
        - 合意に向かう進捗があるか
      rules:
        - condition: 健全（進捗あり）
          next: ai_fix
        - condition: 非生産的（改善なし）
          next: reviewers

  - cycle:
      - reviewers
      - qa-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction_template: |
        reviewers と qa-fix のレビュー・修正サイクルが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（進捗がある）か、
        非生産的（同じ問題を繰り返している）かを判断してください。

        **参照するレポート:**
        - QAレビュー: {report:06-qa-review.md}

        **判断基準:**
        - 各サイクルで修正対象が収束しているか
        - 同じ指摘が繰り返されていないか
        - 反映履歴から改善進捗が確認できるか
      rules:
        - condition: 健全（進捗あり）
          next: reviewers
        - condition: 非生産的（改善なし）
          next: pekko-compat-review

  - cycle:
      - pekko-compat-review
      - pekko-compat-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction_template: |
        pekko-compat-review と pekko-compat-fix のレビュー・修正サイクルが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（進捗がある）か、
        非生産的（同じ問題を繰り返している）かを判断してください。

        **参照するレポート:**
        - Pekko互換性レビュー: {report:05-pekko-compat-review.md}

        **判断基準:**
        - 各サイクルで新しい問題が発見・修正されているか
        - 同じ指摘が繰り返されていないか
        - 修正が実際に反映されているか
      rules:
        - condition: 健全（進捗あり）
          next: pekko-compat-review
        - condition: 非生産的（改善なし）
          next: supervise

  - cycle:
      - supervise
      - pekko-compat-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction_template: |
        supervise と pekko-compat-fix のサイクルが {cycle_count} 回繰り返されました。

        各サイクルのレポートを確認し、このループが健全（進捗がある）か、
        非生産的（同じ問題を繰り返している）かを判断してください。

        **参照するレポート:**
        - スーパーバイザー検証: {report:supervisor-validation.md}

        **判断基準:**
        - 各サイクルで修正が実際に反映され、前回の指摘が解消されているか
        - 同じテスト失敗やビルドエラーが繰り返されていないか
      rules:
        - condition: 健全（進捗あり）
          next: supervise
        - condition: 非生産的（改善なし）
          next: ABORT

movements:
  - name: plan
    edit: false
    persona: planner
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: pekko-porting-plan
    output_contracts:
      report:
        - name: 00-plan.md
          format: plan
    rules:
      - condition: 要件が明確で実装可能
        next: implement
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}

  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: pekko-porting-implement
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
    rules:
      - condition: 実装完了
        next: ai_review
      - condition: 実装未着手（レポートのみ）
        next: ai_review
      - condition: 判断できない、情報不足
        next: ai_review
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true

  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-review
    output_contracts:
      report:
        - name: 04-ai-review.md
          format: ai-review
    rules:
      - condition: AI特有の問題なし
        next: reviewers
      - condition: AI特有の問題あり
        next: ai_fix

  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: ai-fix
    rules:
      - condition: AI問題の修正完了
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai_no_fix
      - condition: 判断できない、情報不足
        next: ai_no_fix

  - name: ai_no_fix
    edit: false
    persona: architecture-reviewer
    policy:
      - review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    instruction: arbitrate
    rules:
      - condition: ai_reviewの指摘が妥当（修正すべき）
        next: ai_fix
      - condition: ai_fixの判断が妥当（修正不要）
        next: reviewers

  - name: reviewers
    edit: false
    persona: pekko-porting-qa-reviewer
    policy:
      - review
      - qa
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: pekko-porting-review-qa
    output_contracts:
      report:
        - name: 06-qa-review.md
          format: qa-review
    rules:
      - condition: approved
        next: pekko-compat-review
      - condition: needs_fix
        next: qa-fix

  - name: qa-fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: pekko-porting-qa-fix
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 判断できない、情報不足
        next: reviewers

  - name: pekko-compat-review
    edit: false
    persona: pekko-porting-compat-reviewer
    policy:
      - review
      - pekko-compat
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: pekko-porting-review-compat
    output_contracts:
      report:
        - name: 05-pekko-compat-review.md
          format: pekko-compat-review
    rules:
      - condition: approved
        next: supervise
      - condition: needs_fix
        next: pekko-compat-fix

  - name: pekko-compat-fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: pekko-porting-compat-fix
    rules:
      - condition: 修正完了
        next: pekko-compat-review
      - condition: 判断できない、情報不足
        next: pekko-compat-review

  - name: supervise
    edit: false
    persona: supervisor
    policy:
      - review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: pekko-porting-supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: すべて問題なし
        next: final-ci
      - condition: テスト失敗、ビルドエラー、要件未達（修正で解決可能）
        next: pekko-compat-fix
      - condition: 根本的な設計変更が必要
        next: plan

  - name: final-ci
    edit: false
    persona: coder
    policy:
      - testing
      - fraktor-coding
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    pass_previous_response: false
    instruction: pekko-porting-final-ci
    rules:
      - condition: ci-check.sh all が成功
        next: COMPLETE
      - condition: ci-check.sh all が失敗
        next: pekko-compat-fix
      - condition: 判断できない、情報不足
        next: pekko-compat-fix
