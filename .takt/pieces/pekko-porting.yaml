name: pekko-porting
description: Pekko互換仕様をRustでテスト先行実装するための開発ワークフロー（ギャップ分析→テスト作成→実装→並列レビュー（QA＋Pekko互換＋テスト品質）→監督）
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 100
initial_step: plan

personas:
  pekko-porting-qa-reviewer: ../facets/personas/pekko-porting-qa-reviewer.md
  pekko-porting-compat-reviewer: ../facets/personas/pekko-porting-compat-reviewer.md

knowledge:
  pekko-porting: ../facets/knowledge/pekko-porting.md

policies:
  fraktor-coding: ../facets/policies/fraktor-coding.md
  pekko-compat: ../facets/policies/pekko-compat.md

instructions:
  pekko-porting-plan: ../facets/instructions/pekko-porting-plan.md
  pekko-porting-implement: ../facets/instructions/pekko-porting-implement.md
  pekko-porting-review-fix: ../facets/instructions/pekko-porting-review-fix.md
  pekko-porting-supervise: ../facets/instructions/pekko-porting-supervise.md
  pekko-porting-final-ci: ../facets/instructions/pekko-porting-final-ci.md
  pekko-porting-ai-fix: ../facets/instructions/pekko-porting-ai-fix.md
  pekko-porting-review-compat: ../facets/instructions/pekko-porting-review-compat.md
  pekko-porting-review-qa: ../facets/instructions/pekko-porting-review-qa.md
  ai-review: ../facets/instructions/ai-review.md
  ai-fix: ../facets/instructions/ai-fix.md
  arbitrate: ../facets/instructions/arbitrate.md
  loop-monitor-plan-implement: ../facets/instructions/loop-monitor-plan-implement.md
  loop-monitor-ai-review-fix-pekko: ../facets/instructions/loop-monitor-ai-review-fix-pekko.md
  loop-monitor-ai-fix-no-fix: ../facets/instructions/loop-monitor-ai-fix-no-fix.md
  loop-monitor-reviewers-review-fix: ../facets/instructions/loop-monitor-reviewers-review-fix.md
  loop-monitor-supervise-pekko-compat-fix: ../facets/instructions/loop-monitor-supervise-pekko-compat-fix.md

report_formats:
  pekko-porting-plan: ../facets/output-contracts/pekko-porting-plan.md
  pekko-porting-qa-review: ../facets/output-contracts/pekko-porting-qa-review.md
  pekko-compat-review: ../facets/output-contracts/pekko-compat-review.md

loop_monitors:
  - cycle:
      - plan
      - write_tests
      - implement
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-plan-implement
      rules:
        - condition: 健全（進捗あり）
          next: plan
        - condition: 非生産的（改善なし）
          next: ai_review

  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-review-fix-pekko
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: ai_no_fix

  - cycle:
      - ai_fix
      - ai_no_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-fix-no-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai_fix
        - condition: 非生産的（改善なし）
          next: reviewers

  - cycle:
      - reviewers
      - review-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-review-fix
      rules:
        - condition: 健全（進捗あり）
          next: reviewers
        - condition: 非生産的（改善なし）
          next: supervise

  - cycle:
      - supervise
      - review-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-supervise-pekko-compat-fix
      rules:
        - condition: 健全（進捗あり）
          next: supervise
        - condition: 非生産的（改善なし）
          next: ABORT

steps:
  - name: plan
    edit: false
    persona: planner
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: pekko-porting-plan
    output_contracts:
      report:
        - name: 00-plan.md
          format: pekko-porting-plan
          use_judge: false
    rules:
      - condition: 未実装タスクあり（バッチ選定完了）
        next: write_tests
      - condition: 全タスク完了（ギャップ分析の対象範囲をすべて実装済み）
        next: ai_review
      - condition: ユーザーが質問をしている（実装タスクではない）
        next: COMPLETE
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}

  - name: write_tests
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    knowledge:
      - pekko-porting
      - architecture
      - unit-testing
      - e2e-testing
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: write-tests-first
    output_contracts:
      report:
        - name: test-scope.md
          format: coder-scope
        - name: test-decisions.md
          format: coder-decisions
    rules:
      - condition: テスト作成が完了した
        next: implement
      - condition: テスト対象が未実装のためテスト作成をスキップする
        next: implement
      - condition: テスト作成を進行できない
        next: plan
      - condition: ユーザーへの確認事項があるためユーザー入力が必要
        next: write_tests
        requires_user_input: true
        interactive_only: true

  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: pekko-porting-implement
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
    rules:
      - condition: バッチの実装完了（未実装タスクが残っている）
        next: plan
      - condition: 全タスク完了（ギャップ分析の対象範囲をすべて実装済み）
        next: ai_review
      - condition: 実装中に問題発生、計画の見直しが必要
        next: plan
      - condition: 判断できない、情報不足
        next: plan
      - condition: ユーザー入力が必要
        next: implement
        requires_user_input: true
        interactive_only: true

  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-review
    output_contracts:
      report:
        - name: 04-ai-review.md
          format: ai-review
    rules:
      - condition: AI特有の問題なし
        next: reviewers
      - condition: AI特有の問題あり
        next: ai_fix

  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: pekko-porting-ai-fix
    rules:
      - condition: AI問題の修正完了
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai_no_fix
      - condition: 判断できない、情報不足
        next: ai_no_fix

  - name: ai_no_fix
    edit: false
    persona: architecture-reviewer
    policy:
      - review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    instruction: arbitrate
    rules:
      - condition: ai_reviewの指摘が妥当（修正すべき）
        next: ai_fix
      - condition: ai_fixの判断が妥当（修正不要）
        next: reviewers

  - name: reviewers
    parallel:
      - name: qa-review
        persona: pekko-porting-qa-reviewer
        policy:
          - review
          - qa
        edit: false
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: pekko-porting-review-qa
        output_contracts:
          report:
            - name: 06-qa-review.md
              format: pekko-porting-qa-review
        rules:
          - condition: approved
          - condition: needs_fix
      - name: pekko-compat-review
        persona: pekko-porting-compat-reviewer
        policy:
          - review
          - pekko-compat
        knowledge:
          - pekko-porting
          - architecture
        edit: false
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: pekko-porting-review-compat
        output_contracts:
          report:
            - name: 05-pekko-compat-review.md
              format: pekko-compat-review
        rules:
          - condition: approved
          - condition: needs_fix
      - name: test-review
        persona: testing-reviewer
        policy:
          - review
          - testing
        edit: false
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
        instruction: review-test
        output_contracts:
          report:
            - name: 07-test-review.md
              format: testing-review
        rules:
          - condition: approved
          - condition: needs_fix
    rules:
      - condition: all("approved")
        next: supervise
      - condition: any("needs_fix")
        next: review-fix

  - name: review-fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: pekko-porting-review-fix
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 修正不要（指摘対象の確認済み、仕様通り）
        next: reviewers
      - condition: 部分的に修正した（残りは仕様通りで修正不要）
        next: reviewers
      - condition: 判断できない、情報不足
        next: reviewers

  - name: supervise
    edit: false
    persona: supervisor
    policy:
      - review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: pekko-porting-supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: summary.md
          format: summary
          use_judge: false
    rules:
      - condition: すべて問題なし
        next: final-ci
      - condition: テスト失敗、ビルドエラー、要件未達（修正で解決可能）
        next: review-fix
      - condition: 根本的な設計変更が必要
        next: plan

  - name: final-ci
    edit: false
    persona: coder
    policy:
      - testing
      - fraktor-coding
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
    pass_previous_response: false
    instruction: pekko-porting-final-ci
    rules:
      - condition: ci-check.sh ai all が成功
        next: COMPLETE
      - condition: ci-check.sh ai all が失敗
        next: review-fix
      - condition: 判断できない、情報不足
        next: review-fix
