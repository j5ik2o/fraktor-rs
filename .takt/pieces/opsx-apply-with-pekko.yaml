name: opsx-apply-with-pekko
description: OpenSpec Apply + Pekko互換性レビュー — バッチ実装ループ後にPekko互換チェックを挟む統合ピース
piece_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 80
initial_movement: plan

# --- pekko-porting 由来のカスタムファセット ---
personas:
  pekko-porting-compat-reviewer: ../facets/personas/pekko-porting-compat-reviewer.md

knowledge:
  pekko-porting: ../facets/knowledge/pekko-porting.md

policies:
  fraktor-coding: ../facets/policies/fraktor-coding.md
  pekko-compat: ../facets/policies/pekko-compat.md

# --- カスタムファセット セクションマップ ---
instructions:
  plan: ../facets/instructions/opsx-apply-plan.md
  implement: ../facets/instructions/opsx-apply-execute.md
  pekko-porting-review-compat: ../facets/instructions/pekko-porting-review-compat.md
  opsx-apply-with-pekko-implement: ../facets/instructions/opsx-apply-with-pekko-implement.md
  opsx-apply-with-pekko-fix: ../facets/instructions/opsx-apply-with-pekko-fix.md
  opsx-apply-with-pekko-qa-review: ../facets/instructions/opsx-apply-with-pekko-qa-review.md
  opsx-apply-with-pekko-compat-fix: ../facets/instructions/opsx-apply-with-pekko-compat-fix.md
  opsx-apply-with-pekko-supervise: ../facets/instructions/opsx-apply-with-pekko-supervise.md
  loop-monitor-plan-implement-batch: ../facets/instructions/loop-monitor-plan-implement-batch.md
  loop-monitor-ai-review-fix: ../facets/instructions/loop-monitor-ai-review-fix.md
  loop-monitor-reviewers-fix: ../facets/instructions/loop-monitor-reviewers-fix.md
  loop-monitor-pekko-compat-review-fix: ../facets/instructions/loop-monitor-pekko-compat-review-fix.md

report_formats:
  opsx-apply-summary: ../facets/output-contracts/opsx-apply-summary.md
  opsx-apply-impl-validation: ../facets/output-contracts/cc-sdd-impl-validation.md
  pekko-compat-review: ../facets/output-contracts/pekko-compat-review.md

# --- ループ監視 ---
loop_monitors:
  - cycle:
      - plan
      - implement
    threshold: 5
    judge:
      persona: supervisor
      instruction: loop-monitor-plan-implement-batch
      rules:
        - condition: 健全（進捗あり）
          next: plan
        - condition: 非生産的（改善なし）
          next: ai_review

  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-review-fix
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: reviewers

  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: 健全（進捗あり）
          next: reviewers
        - condition: 非生産的（改善なし）
          next: pekko-compat-review

  - cycle:
      - pekko-compat-review
      - pekko-compat-fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-pekko-compat-review-fix
      rules:
        - condition: 健全（進捗あり）
          next: pekko-compat-review
        - condition: 非生産的（改善なし）
          next: supervise

# --- Movement定義 ---
movements:
  # ===== スケジューラー: タスク流動を見てバッチ決定 =====
  - name: plan
    edit: false
    persona: planner
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: plan
    output_contracts:
      report:
        - name: 00-plan.md
          format: plan
    rules:
      - condition: 未着手タスクあり
        next: implement
      - condition: 全タスク完了
        next: ai_review
      - condition: tasks.mdが存在しない、またはブロック状態
        next: ABORT
        appendix: |
          tasks.md が見つからないかブロック状態です。
          opsx-propose ピースを先に実行してください。
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}

  # ===== 逐次実装: バッチ内タスクのみ実装 =====
  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - backend
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    instruction: opsx-apply-with-pekko-implement
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
    rules:
      - condition: バッチの実装完了
        next: plan
      - condition: 実装中に問題発生、計画の見直しが必要
        next: plan
      - condition: 判断できない、情報不足
        next: plan

  # ===== AIレビュー =====
  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: ai-review
    output_contracts:
      report:
        - name: 04-ai-review.md
          format: ai-review
    rules:
      - condition: AI特有の問題なし
        next: reviewers
      - condition: AI特有の問題あり
        next: ai_fix

  # ===== AI問題修正 =====
  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - backend
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: ai-fix
    rules:
      - condition: AI問題の修正完了
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai_no_fix
      - condition: 判断できない、情報不足
        next: ai_no_fix

  - name: ai_no_fix
    edit: false
    persona: architecture-reviewer
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    instruction: arbitrate
    rules:
      - condition: ai_reviewの指摘が妥当（修正すべき）
        next: ai_fix
      - condition: ai_fixの判断が妥当（修正不要）
        next: reviewers

  # ===== レビュー（並列: arch + qa + impl-validation） =====
  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          - architecture
          - backend
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: review-arch
        output_contracts:
          report:
            - name: 05-architect-review.md
              format: architecture-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        instruction: opsx-apply-with-pekko-qa-review
        output_contracts:
          report:
            - name: 06-qa-review.md
              format: qa-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: impl-validation
        edit: false
        persona: supervisor
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - Bash
        instruction: validate-impl
        output_contracts:
          report:
            - name: 07-impl-validation.md
              format: opsx-apply-impl-validation
        rules:
          - condition: 検証合格
          - condition: 検証不合格

    rules:
      - condition: all("approved", "approved", "検証合格")
        next: pekko-compat-review
      - condition: any("needs_fix", "検証不合格")
        next: fix

  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - backend
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: opsx-apply-with-pekko-fix
    rules:
      - condition: 修正完了
        next: reviewers
      - condition: 判断できない、情報不足
        next: plan

  # ===== Pekko互換性レビュー =====
  - name: pekko-compat-review
    edit: false
    persona: pekko-porting-compat-reviewer
    policy:
      - review
      - pekko-compat
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: pekko-porting-review-compat
    output_contracts:
      report:
        - name: 08-pekko-compat-review.md
          format: pekko-compat-review
    rules:
      - condition: approved
        next: supervise
      - condition: needs_fix
        next: pekko-compat-fix

  - name: pekko-compat-fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - pekko-porting
      - architecture
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: edit
    pass_previous_response: false
    instruction: opsx-apply-with-pekko-compat-fix
    rules:
      - condition: 修正完了（ci-check.sh ai all 通過済み）
        next: pekko-compat-review
      - condition: 判断できない、情報不足
        next: pekko-compat-review

  # ===== 最終検証 =====
  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: opsx-apply-with-pekko-supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
        - name: apply-summary.md
          format: opsx-apply-summary
          use_judge: false
    rules:
      - condition: すべて問題なし
        next: COMPLETE
      - condition: テスト失敗、ビルドエラー、要件未達（修正で解決可能）
        next: pekko-compat-fix
      - condition: 根本的な設計変更が必要
        next: plan
