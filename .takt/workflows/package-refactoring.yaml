name: package-refactoring
description: パッケージ／モジュール構造のリファクタリング専用（分析→設計→計画→実装→AIレビュー→arch+QA→監督）
workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true
max_movements: 100
initial_movement: analyze

personas:
  package-structure-analyst: ../facets/personas/package-structure-analyst.md

knowledge:
  package-design-principles: ../facets/knowledge/package-design-principles.md

instructions:
  analyze-package-structure: ../facets/instructions/analyze-package-structure.md
  design-package-structure: ../facets/instructions/design-package-structure.md
  plan-package-migration: ../facets/instructions/plan-package-migration.md
  pkg-implement: ../facets/instructions/pkg-implement.md
  pkg-review-arch: ../facets/instructions/pkg-review-arch.md
  pkg-review-qa: ../facets/instructions/pkg-review-qa.md
  pkg-supervise: ../facets/instructions/pkg-supervise.md
  pkg-ai-review: ../facets/instructions/pkg-ai-review.md
  pkg-ai-fix: ../facets/instructions/pkg-ai-fix.md
  arbitrate: ../facets/instructions/arbitrate.md
  pkg-fix: ../facets/instructions/pkg-fix.md
  loop-monitor-ai-review-fix-refactoring: ../facets/instructions/loop-monitor-ai-review-fix-refactoring.md
  loop-monitor-reviewers-fix-refactoring: ../facets/instructions/loop-monitor-reviewers-fix-refactoring.md

policies:
  fraktor-coding: ../facets/policies/fraktor-coding.md

report_formats:
  structure-analysis: ../facets/output-contracts/structure-analysis.md
  structure-design: ../facets/output-contracts/structure-design.md
  ai-review: ../facets/output-contracts/ai-review.md
  coder-scope: ../facets/output-contracts/coder-scope.md
  coder-decisions: ../facets/output-contracts/pkg-coder-decisions.md
  pkg-architect-review: ../facets/output-contracts/pkg-architect-review.md
  pkg-supervisor-validation: ../facets/output-contracts/pkg-supervisor-validation.md
  pkg-summary: ../facets/output-contracts/pkg-summary.md

loop_monitors:
  - cycle:
      - ai_review
      - ai_fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-ai-review-fix-refactoring
      rules:
        - condition: 健全（進捗あり）
          next: ai_review
        - condition: 非生産的（改善なし）
          next: reviewers

  - cycle:
      - reviewers
      - fix
    threshold: 3
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix-refactoring
      rules:
        - condition: 健全（進捗あり）
          next: reviewers
        - condition: 非生産的（改善なし）
          next: supervise

movements:
  - name: analyze
    edit: false
    persona: package-structure-analyst
    knowledge:
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: analyze-package-structure
    output_contracts:
      report:
        - name: structure-analysis.md
          format: structure-analysis
    rules:
      - condition: 分析完了・次ムーブメントへ進行可能
        next: design
      - condition: スコープ不明・参照実装が特定できない等で分析不能
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}

  - name: design
    edit: false
    persona: package-structure-analyst
    knowledge:
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: design-package-structure
    output_contracts:
      report:
        - name: structure-design.md
          format: structure-design
    rules:
      - condition: 設計完了・planへ進行可能
        next: plan
      - condition: 分析との矛盾・再分析が必要
        next: analyze
      - condition: 設計案が規約違反で再設計が必要
        next: analyze

  - name: plan
    edit: false
    persona: planner
    knowledge:
      - architecture
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    instruction: plan-package-migration
    output_contracts:
      report:
        - name: plan.md
          format: plan
    rules:
      - condition: 要件が明確で実装可能
        next: implement
      - condition: 要件が不明確、情報不足
        next: ABORT
        appendix: |
          確認事項:
          - {質問1}
          - {質問2}
      - condition: 設計の見直しが必要
        next: design

  - name: implement
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - architecture
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: full
    instruction: pkg-implement
    output_contracts:
      report:
        - name: coder-scope.md
          format: coder-scope
        - name: coder-decisions.md
          format: coder-decisions
    rules:
      - condition: 実装完了
        next: ai_review
      - condition: 実装未着手（レポートのみ）
        next: plan
      - condition: 判断できない、情報不足
        next: plan
      - condition: ユーザー入力が必要
        next: plan

  - name: ai_review
    edit: false
    persona: ai-antipattern-reviewer
    policy:
      - review
      - ai-antipattern
    knowledge:
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - WebSearch
          - WebFetch
    instruction: pkg-ai-review
    output_contracts:
      report:
        - name: ai-review.md
          format: ai-review
    rules:
      - condition: AI特有の問題なし
        next: reviewers
      - condition: AI特有の問題あり
        next: ai_fix

  - name: ai_fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    session: refresh
    knowledge:
      - architecture
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: full
    pass_previous_response: false
    instruction: pkg-ai-fix
    rules:
      - condition: AI問題の修正完了
        next: ai_review
      - condition: 修正不要（指摘対象ファイル/仕様の確認済み）
        next: ai_no_fix
      - condition: 判断できない、情報不足
        next: ai_no_fix

  - name: ai_no_fix
    edit: false
    persona: architecture-reviewer
    policy: review
    knowledge:
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    instruction: arbitrate
    rules:
      - condition: ai_reviewの指摘が妥当（修正すべき）
        next: ai_fix
      - condition: ai_fixの判断が妥当（修正不要）
        next: reviewers

  - name: reviewers
    parallel:
      - name: arch-review
        edit: false
        persona: architecture-reviewer
        policy: review
        knowledge:
          - architecture
          - package-design-principles
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: pkg-review-arch
        output_contracts:
          report:
            - name: architect-review.md
              format: pkg-architect-review
      - name: qa-review
        edit: false
        persona: qa-reviewer
        policy:
          - review
          - qa
        knowledge:
          - package-design-principles
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
              - WebSearch
              - WebFetch
        rules:
          - condition: approved
          - condition: needs_fix
        instruction: pkg-review-qa
        output_contracts:
          report:
            - name: qa-review.md
              format: qa-review
    rules:
      - condition: all("approved")
        next: supervise
      - condition: any("needs_fix")
        next: fix

  - name: fix
    edit: true
    persona: coder
    policy:
      - coding
      - testing
      - fraktor-coding
    knowledge:
      - architecture
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
          - WebSearch
          - WebFetch
    required_permission_mode: full
    pass_previous_response: false
    instruction: pkg-fix
    rules:
      - condition: 修正完了（ci-check.sh 通過済み）
        next: reviewers
      - condition: 判断できない、情報不足
        next: plan

  - name: supervise
    edit: false
    persona: supervisor
    policy: review
    knowledge:
      - package-design-principles
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Bash
          - WebSearch
          - WebFetch
    pass_previous_response: false
    instruction: pkg-supervise
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: pkg-supervisor-validation
        - name: summary.md
          format: pkg-summary
          use_judge: false
    rules:
      - condition: すべて問題なし
        next: COMPLETE
      - condition: テスト失敗、ビルドエラー、要件未達（修正で解決可能）
        next: fix
      - condition: 根本的な設計変更が必要
        next: design
