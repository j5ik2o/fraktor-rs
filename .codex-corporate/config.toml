model = "gpt-5.5"
model_reasoning_effort = "xhigh"
hide_agent_reasoning = true
network_access = true
web_search = "live"
personality = "pragmatic"

[features]
codex_hooks = true
rmcp_client = true
skills = true
unified_exec = true
apps = false
shell_snapshot = true
steer = true
multi_agent = true
js_repl = true
prevent_idle_sleep = true

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.worker]
description = "Implementation-focused agent for small targeted fixes."
config_file = "agents/worker.toml"

[tui]
status_line = ["current-dir", "git-branch"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[projects."/Users/j5ik2o/Sources/j5ik2o.github.com/j5ik2o/fraktor-rs"]
trust_level = "trusted"

[notice]
hide_rate_limit_model_nudge = true

[plugins."gmail@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true
