model = "gpt-5.4"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
hide_agent_reasoning = false
show_raw_agent_reasoning = true
network_access = true
web_search = "live"
personality = "pragmatic"
developer_instructions = """
実装を開始する場合、Planモードで提示した計画内容を、docs/plan/*.mdファイルへ書き出すこと。
計画が存在しない場合はこの指示は無視して構わない。
"""
model_context_window= 1000000
model_auto_compact_token_limit = 950000

[features]
multi_agent = true
rmcp_client = true
unified_exec = true
shell_snapshot = true
steer = true
js_repl = false
prevent_idle_sleep = true

[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence."
config_file = "agents/explorer.toml"

[agents.reviewer]
description = "PR reviewer focused on correctness, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.worker]
description = "Implementation-focused agent for small targeted fixes."
config_file = "agents/worker.toml"

# NOTE: `uvx --from git+https://github.com/oraios/serena@<version>` のような
# `@version` 固定は壊れやすい。Serena 側の project.yml / serena_config.yml の
# フォーマット変更とズレると、MCP 初期化時に handshake 前に落ちることがある。
# 実際に `@v0.1.4` 固定では `language` KeyError で起動失敗したため、ここでは pin しない。
[mcp_servers.serena]
command = "zsh"
args = ["-lc", "export HOME=\"$PWD/.serena-home\"; mkdir -p \"$HOME\"; exec uvx --from git+https://github.com/oraios/serena serena start-mcp-server --context codex --project . --enable-web-dashboard false"]

[tui]
status_line = ["current-dir", "git-branch"]

[projects."/Users/j5ik2o/Sources/j5ik2o.github.com/j5ik2o/fraktor-rs"]
trust_level = "trusted"
