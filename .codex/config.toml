developer_instructions = """
実装を開始する場合、Planモードで提示した計画内容を、docs/plan/*.mdファイルへ書き出すこと。
計画が存在しない場合はこの指示は無視して構わない。
"""
hide_agent_reasoning = false
model = "gpt-5.4"
model_auto_compact_token_limit = 950000
model_context_window = 1000000
model_reasoning_effort = "xhigh"
model_reasoning_summary = "detailed"
network_access = true
personality = "pragmatic"
show_raw_agent_reasoning = true
web_search = "live"

[agents]
max_depth = 1
max_threads = 4

[agents.explorer]
config_file = "agents/explorer.toml"
description = "Read-only codebase explorer for gathering evidence."

[agents.reviewer]
config_file = "agents/reviewer.toml"
description = "PR reviewer focused on correctness, security, and missing tests."

[agents.worker]
config_file = "agents/worker.toml"
description = "Implementation-focused agent for small targeted fixes."

[features]
codex_hooks = true
js_repl = false
multi_agent = true
prevent_idle_sleep = true
rmcp_client = true
shell_snapshot = true
steer = true
unified_exec = true

[[hooks.PostToolUse]]
matcher = "^(apply_patch|Edit|Write)$"

[[hooks.PostToolUse.hooks]]
type = "command"
command = '/usr/bin/python3 "$(git rev-parse --show-toplevel)/.codex/hooks/run_dylint_after_rust_edit.py"'
timeout = 1800
statusMessage = "Rust 変更後の dylint を確認中"

[projects."/Users/j5ik2o/Sources/j5ik2o.github.com/j5ik2o/fraktor-rs"]
trust_level = "trusted"

[shell_environment_policy]
inherit = "core"

[shell_environment_policy.set]
BASH_MAX_OUTPUT_LENGTH = "10000"
CLAUDE_AUTOCOMPACT_PCT_OVERRIDE = "60"
CLAUDE_AUTO_BACKGROUND_TASKS = "1"
CLAUDE_BASH_MAINTAIN_PROJECT_WORKING_DIR = "1"
CLAUDE_CODE_DEBUG_LOG_LEVEL = "info"
CLAUDE_CODE_DISABLE_ADAPTIVE_THINKING = "1"
CLAUDE_CODE_DISABLE_AUTO_MEMORY = "1"
CLAUDE_CODE_DISABLE_FEEDBACK_SURVEY = "1"
CLAUDE_CODE_DISABLE_GIT_INSTRUCTIONS = "1"
CLAUDE_CODE_ENABLE_TASKS = "1"
CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS = "1"
CLAUDE_CODE_SUBAGENT_MODEL = "sonnet"
DISABLE_EXTRA_USAGE_COMMAND = "1"
ENABLE_CLAUDEAI_MCP_SERVERS = "false"
ENABLE_TOOL_SEARCH = "auto:5"
MAX_THINKING_TOKENS = "8000"
TASK_MAX_OUTPUT_LENGTH = "16000"
USE_BUILTIN_RIPGREP = "0"

[tui]
status_line = [
    "current-dir",
    "git-branch",
]
